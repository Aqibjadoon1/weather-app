<!-- STITCH_SHADER_START:ANIMATION_2 class="absolute inset-0 w-full h-full z-0" -->
<div class="absolute inset-0 w-full h-full z-0" style="display:block;">
<canvas id="shader-canvas-ANIMATION_2" style="display:block;width:100%;height:100%" width="1280" height="1024"></canvas>
<script>
(function() {
  const canvas = document.getElementById('shader-canvas-ANIMATION_2');

  // Sync the WebGL drawing-buffer size with the CSS-driven layout size.
  // This fires on initial layout and whenever the element is resized.
  function syncSize() {
    const w = canvas.clientWidth  || 1280;
    const h = canvas.clientHeight || 720;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width  = w;
      canvas.height = h;
    }
  }
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(syncSize).observe(canvas);
  }
  syncSize();

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
  const fs = `precision highp float;
uniform float u_time;
uniform vec2 u_resolution;

varying vec2 v_texCoord;

// Simplex 2D noise
vec3 permute(vec3 x) { return mod(((x*34.0)+1.0)*x, 289.0); }
float snoise(vec2 v){
  const vec4 C = vec4(0.211324865405187, 0.366025403784439,
           -0.577350269189626, 0.024390243902439);
  vec2 i  = floor(v + dot(v, C.yy) );
  vec2 x0 = v -   i + dot(i, C.xx);
  vec2 i1;
  i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
  vec4 x12 = x0.xyxy + C.xxzz;
  x12.xy -= i1;
  i = mod(i, 289.0);
  vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0 ))
  + i.x + vec3(0.0, i1.x, 1.0 ));
  vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy),
    dot(x12.zw,x12.zw)), 0.0);
  m = m*m ;
  m = m*m ;
  vec3 x = 2.0 * fract(p * C.www) - 1.0;
  vec3 h = abs(x) - 0.5;
  vec4 ox = floor(x + 0.5);
  vec4 a0 = x.xyxy + ox.xxyy;
  m *= 1.79284291400159 - 0.85373472095314 * ( a0*a0 + h*h );
  vec3 g;
  g.x  = a0.x  * x0.x  + h.x  * x0.y;
  g.yz = a0.yz * x12.xz + h.yz * x12.yw;
  return 130.0 * dot(m, g);
}

void main() {
    vec2 uv = v_texCoord;
    
    // Base gradient colors from "Atmospheric Editorial" (Premium Bright)
    vec3 skyTop = vec3(0.0, 0.48, 1.0); // Primary Blue
    vec3 skyBottom = vec3(0.95, 0.95, 1.0); // Surface Light
    
    // Atmospheric shifting
    float noise = snoise(uv * 1.5 + u_time * 0.05);
    float noise2 = snoise(uv * 3.0 - u_time * 0.1);
    
    vec3 color = mix(skyBottom, skyTop, uv.y + noise * 0.1);
    
    // Cloud layers
    float cloud = snoise(uv * 2.0 + vec2(u_time * 0.02, 0.0));
    cloud = smoothstep(0.4, 0.8, cloud);
    color = mix(color, vec3(1.0), cloud * 0.3);
    
    // Subtle sun glow influence (sun is handled in ThreeJS or CSS, but glow is here)
    float dist = distance(uv, vec2(0.8, 0.8));
    float glow = smoothstep(0.5, 0.0, dist);
    color += vec3(1.0, 0.8, 0.5) * glow * 0.15;

    gl_FragColor = vec4(color, 1.0);
}`;
  function cs(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes = gl.getUniformLocation(prog, 'u_resolution');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  // u_mouse is in pixel coordinates matching u_resolution (ShaderToy convention).
  // Shaders that need normalized coords should use: u_mouse / u_resolution.
  let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
  window.addEventListener('mousemove', (event) => {
    const rect = canvas.getBoundingClientRect();
    if (rect.width && rect.height) {
      const nx = (event.clientX - rect.left) / rect.width;
      const ny = 1.0 - (event.clientY - rect.top) / rect.height;
      mouse.x = nx * canvas.width;
      mouse.y = ny * canvas.height;
    }
  });

  function render(t) {
    if (typeof ResizeObserver === 'undefined') syncSize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (uTime) gl.uniform1f(uTime, t * 0.001);
    if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
    if (uMouse) gl.uniform2f(uMouse, mouse.x, mouse.y);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render(0);
})();
</script>

<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_3" style="width:100%;height:100%"><canvas width="1280" height="1024" style="display: block; width: 1280px; height: 1024px;"></canvas><canvas width="1280" height="1024" style="display: block; width: 1280px; height: 1024px;"></canvas></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_3');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
container.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
scene.add(ambientLight);
const pointLight = new THREE.PointLight(0xffcc00, 1.5);
pointLight.position.set(5, 5, 5);
scene.add(pointLight);

// The Sun - Rotating and Pulsing
const sunGroup = new THREE.Group();
const sunGeometry = new THREE.SphereGeometry(1, 32, 32);
const sunMaterial = new THREE.MeshPhongMaterial({ 
    color: 0xffcc33, 
    emissive: 0xffaa00,
    shininess: 100 
});
const sun = new THREE.Mesh(sunGeometry, sunMaterial);
sunGroup.add(sun);

// Sun Rays
for(let i=0; i<12; i++) {
    const rayGeo = new THREE.CylinderGeometry(0.05, 0.1, 0.8, 8);
    const rayMat = new THREE.MeshPhongMaterial({ color: 0xffcc33 });
    const ray = new THREE.Mesh(rayGeo, rayMat);
    const angle = (i / 12) * Math.PI * 2;
    ray.position.set(Math.cos(angle) * 1.5, Math.sin(angle) * 1.5, 0);
    ray.rotation.z = angle + Math.PI/2;
    sunGroup.add(ray);
}
sunGroup.position.set(width > 768 ? 4 : 0, 3, -5);
scene.add(sunGroup);

// Wind Particles & Leaves
const particlesCount = 150;
const positions = new Float32Array(particlesCount * 3);
const velocities = [];

for(let i = 0; i < particlesCount; i++) {
    positions[i*3] = (Math.random() - 0.5) * 20;
    positions[i*3+1] = (Math.random() - 0.5) * 20;
    positions[i*3+2] = (Math.random() - 0.5) * 5;
    velocities.push({
        x: 0.02 + Math.random() * 0.05,
        y: (Math.random() - 0.5) * 0.02,
        phase: Math.random() * Math.PI * 2
    });
}

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const mat = new THREE.PointsMaterial({ size: 0.05, color: 0xffffff, transparent: true, opacity: 0.6 });
const windParticles = new THREE.Points(geo, mat);
scene.add(windParticles);

// Birds (Simple V-shapes)
const birds = [];
function createBird() {
    const birdGroup = new THREE.Group();
    const wingGeo = new THREE.PlaneGeometry(0.2, 0.05);
    const wingMat = new THREE.MeshBasicMaterial({ color: 0x333333, side: THREE.DoubleSide });
    const leftWing = new THREE.Mesh(wingGeo, wingMat);
    const rightWing = new THREE.Mesh(wingGeo, wingMat);
    leftWing.position.x = -0.1;
    rightWing.position.x = 0.1;
    birdGroup.add(leftWing, rightWing);
    birdGroup.position.set(-10 - Math.random() * 5, 2 + Math.random() * 3, -4);
    scene.add(birdGroup);
    return { mesh: birdGroup, lw: leftWing, rw: rightWing, speed: 0.03 + Math.random() * 0.02, phase: Math.random() * Math.PI };
}
for(let i=0; i<5; i++) birds.push(createBird());

camera.position.z = 8;

function animate() {
    requestAnimationFrame(animate);
    const time = Date.now() * 0.001;

    // Sun Animation
    sunGroup.rotation.z += 0.005;
    sun.scale.setScalar(1 + Math.sin(time * 2) * 0.05);

    // Wind Animation
    const pos = windParticles.geometry.attributes.position.array;
    for(let i=0; i<particlesCount; i++) {
        pos[i*3] += velocities[i].x;
        pos[i*3+1] += Math.sin(time + velocities[i].phase) * 0.01;
        if(pos[i*3] > 10) pos[i*3] = -10;
    }
    windParticles.geometry.attributes.position.needsUpdate = true;

    // Bird Animation
    birds.forEach(b => {
        b.mesh.position.x += b.speed;
        b.mesh.position.y += Math.sin(time + b.phase) * 0.005;
        const flap = Math.sin(time * 10 + b.phase) * 0.5;
        b.lw.rotation.z = flap;
        b.rw.rotation.z = -flap;
        if(b.mesh.position.x > 12) b.mesh.position.x = -12;
    });

    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
});

animate();
})();
</script>

<script>
        const messages = [
            "Checking today's skies...",
            "Talking with the clouds...",
            "Preparing your weather companion...",
            "Packing your umbrella..."
        ];
        
        const messageElement = document.getElementById('loading-message');
        let currentIndex = 0;

        function cycleMessages() {
            messageElement.style.opacity = '0';
            
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % messages.length;
                messageElement.textContent = messages[currentIndex];
                messageElement.style.opacity = '1';
            }, 500); // Wait for fade out
        }

        // Initial fade in
        setTimeout(() => {
            messageElement.style.opacity = '1';
        }, 800);

        setInterval(cycleMessages, 3000);
    </script>
