<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed-variant": "#004493",
                        "on-tertiary-container": "#fffbff",
                        "tertiary-container": "#c64f00",
                        "on-background": "#181c23",
                        "surface-bright": "#f9f9ff",
                        "tertiary-fixed": "#ffdbcc",
                        "on-error": "#ffffff",
                        "on-secondary-fixed-variant": "#3631b4",
                        "inverse-on-surface": "#eef0fc",
                        "primary-fixed": "#d8e2ff",
                        "on-surface": "#181c23",
                        "secondary-fixed-dim": "#c2c1ff",
                        "background": "#f9f9ff",
                        "tertiary": "#9e3d00",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed": "#001a41",
                        "surface-dim": "#d8d9e5",
                        "error-container": "#ffdad6",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#ffb595",
                        "secondary-fixed": "#e2dfff",
                        "surface-container-highest": "#e0e2ed",
                        "error": "#ba1a1a",
                        "outline-variant": "#c1c6d7",
                        "secondary-container": "#6664e4",
                        "primary-container": "#0070eb",
                        "on-primary-container": "#fefcff",
                        "inverse-surface": "#2d3039",
                        "on-tertiary-fixed-variant": "#7c2e00",
                        "surface": "#f9f9ff",
                        "on-tertiary-fixed": "#351000",
                        "secondary": "#4c4aca",
                        "on-tertiary": "#ffffff",
                        "surface-tint": "#005bc1",
                        "surface-container": "#ecedf9",
                        "surface-container-low": "#f1f3fe",
                        "primary-fixed-dim": "#adc6ff",
                        "on-secondary-container": "#fffbff",
                        "inverse-primary": "#adc6ff",
                        "primary": "#0058bc",
                        "on-surface-variant": "#414755",
                        "on-error-container": "#93000a",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-high": "#e6e8f3",
                        "surface-variant": "#e0e2ed",
                        "outline": "#717786",
                        "on-secondary-fixed": "#0c006a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "8px",
                        "section-margin": "40px",
                        "element-gap": "16px",
                        "container-padding": "24px",
                        "asymmetric-offset": "12px"
                    },
                    "fontFamily": {
                        "label-bold": ["Inter"],
                        "caption": ["Playfair Display"],
                        "hero-temp": ["Playfair Display"],
                        "headline-lg-mobile": ["Playfair Display"],
                        "headline-lg": ["Playfair Display"],
                        "body-md": ["Inter"],
                        "headline-md": ["Playfair Display"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "label-bold": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                        "caption": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "hero-temp": ["120px", {"lineHeight": "110px", "letterSpacing": "-0.04em", "fontWeight": "700"}],
                        "headline-lg-mobile": ["36px", {"lineHeight": "40px", "fontWeight": "700"}],
                        "headline-lg": ["48px", {"lineHeight": "52px", "letterSpacing": "-0.02em", "fontWeight": "700"}],

                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .grain-texture {
            background-image: url("https://www.transparenttextures.com/patterns/p6.png");
            opacity: 0.03;
            pointer-events: none;
        }
        .bounce-in {
            animation: bounce 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes bounce {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .floating {
            animation: floating 6s ease-in-out infinite;
        }
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen selection:bg-primary-fixed overflow-x-hidden">
<!-- Top Nav Shell - Simplified for transactional/task-focused screen -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-container-padding py-4 bg-surface/80 backdrop-blur-xl">
<div class="font-headline-md text-headline-md text-primary tracking-tight">Aether</div>
<div class="flex gap-4">
<button class="material-symbols-outlined text-on-surface-variant p-2 rounded-full hover:bg-on-surface/5 transition-colors">account_circle</button>
<button class="material-symbols-outlined text-on-surface-variant p-2 rounded-full hover:bg-on-surface/5 transition-colors">settings</button>
</div>
</header>
<main class="relative pt-24 pb-12 flex flex-col items-center justify-center min-h-screen px-container-padding">
<!-- Subtle noise background for editorial feel -->
<div class="absolute inset-0 grain-texture z-0"></div>
<div class="max-w-6xl w-full grid grid-cols-1 md:grid-cols-2 gap-12 items-center relative z-10">
<!-- Left Side: Editorial Content -->
<div class="order-2 md:order-1 flex flex-col items-start text-left space-y-8">
<div class="space-y-4">
<span class="font-label-bold text-label-bold text-secondary-fixed-dim uppercase tracking-widest bg-secondary-container/10 px-3 py-1 rounded-full">
                        System Alert
                    </span>
<h1 class="font-headline-lg text-headline-lg text-on-background leading-tight">
                        Horizon Hidden
                    </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-md">
                        Without your coordinates, we're navigating by the stars. Enable location for a precise atmosphere.
                    </p>
</div>
<div class="flex flex-col sm:flex-row gap-4 w-full sm:w-auto">
<button class="bg-primary text-on-primary px-8 py-4 rounded-full font-label-bold text-label-bold flex items-center justify-center gap-2 hover:bg-primary-container transition-all active:scale-95 shadow-lg shadow-primary/20">
                        Enable Location
                        <span class="material-symbols-outlined">near_me</span>
</button>
<button class="text-secondary font-label-bold text-label-bold px-8 py-4 rounded-full flex items-center justify-center gap-2 hover:bg-on-surface/5 transition-colors active:scale-95">
                        Search Manually
                        <span class="material-symbols-outlined">search</span>
</button>
</div>
<div class="pt-8 border-t border-outline-variant w-full max-w-sm">
<div class="flex gap-6 items-center">
<div class="flex -space-x-3">
<div class="w-10 h-10 rounded-full border-2 border-white bg-surface-container flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-primary text-sm">cloud</span>
</div>
<div class="w-10 h-10 rounded-full border-2 border-white bg-surface-container flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-secondary text-sm">thunderstorm</span>
</div>
<div class="w-10 h-10 rounded-full border-2 border-white bg-surface-container flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-tertiary text-sm">wb_sunny</span>
</div>
</div>
<p class="text-caption font-caption text-outline italic">
                            Join 2M+ travelers syncing with local rhythms.
                        </p>
</div>
</div>
</div>
<!-- Right Side: Large Visual Illustration -->
<div class="order-1 md:order-2 flex justify-center items-center relative">
<!-- Decorative element behind the main image -->
<div class="absolute -top-12 -right-12 w-64 h-64 bg-primary-container/5 rounded-full blur-3xl"></div>
<div class="absolute -bottom-12 -left-12 w-80 h-80 bg-secondary-container/5 rounded-full blur-3xl"></div>
<div class="relative w-full max-w-lg aspect-square flex items-center justify-center floating">
<div class="w-full h-full bg-surface-container-lowest rounded-3xl shadow-[0_40px_100px_rgba(76,74,202,0.08)] overflow-hidden border border-outline-variant/20 relative">
<!-- Compass Image Injection -->
<img alt="Large editorial illustration of an antique brass compass resting on a white marble surface, symbolizing lost direction and exploration." class="w-full h-full object-cover grayscale-[0.2] hover:grayscale-0 transition-all duration-700" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBXQPgocrt38Ctt0DqYisKWAEYGAMKVKl4VNCrL00XBOFrhX9U-kGlfD6XWfg51bxqXUEoqW4DosILBnfRsU_947Z0BjRZfsFRIYaWsRnwMOMeTtZea94cbLjkeiErqsEGyuG9PR-SoVBOZFTF5Wnvkb6RCAwtJLgaj4Wb9yuGRaJxZWn5whYhbqHV6-m6PZ46hcG2X34ceyRUXvUDGksi9Lb7SuJfL3lwZo3Rq22136FEgfiLLdSaq"/>
<!-- Overlay Glass Effect -->
<div class="absolute bottom-6 left-6 right-6 p-6 backdrop-blur-md bg-white/40 border border-white/40 rounded-2xl flex items-center justify-between">
<div>
<p class="font-label-bold text-label-bold text-on-surface uppercase tracking-tighter">Current Status</p>
<p class="font-caption text-caption text-on-surface-variant">Uncharted Territory</p>
</div>
<span class="material-symbols-outlined text-error" style="font-variation-settings: 'FILL' 1;">location_off</span>
</div>
</div>
<!-- Floating Badge -->
<div class="absolute -top-6 -left-6 bg-white p-4 rounded-2xl shadow-xl border border-outline-variant/10 bounce-in">
<div class="w-12 h-12 bg-tertiary-fixed rounded-xl flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-tertiary">star</span>
</div>
<p class="font-label-bold text-[10px] uppercase text-outline">Precise Data Required</p>
</div>
</div>
</div>
</div>
</main>
<!-- Background Elements -->
<div class="fixed top-[20%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary-container/5 blur-[120px] pointer-events-none -z-10"></div>
<div class="fixed bottom-[-10%] right-[-5%] w-[30%] h-[30%] rounded-full bg-secondary-container/5 blur-[100px] pointer-events-none -z-10"></div>
<script>
        // Micro-interactions
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            const container = document.querySelector('.floating');
            if(container) {
                container.style.transform = `translate(${x}px, ${y}px)`;
            }
        });

        // Simulating the "Enable Location" click
        const enableBtn = document.querySelector('button.bg-primary');
        enableBtn.addEventListener('click', () => {
            enableBtn.classList.add('scale-95');
            setTimeout(() => {
                enableBtn.classList.remove('scale-95');
                // Trigger hypothetical permission prompt
                alert("Requesting location access from the browser...");
            }, 200);
        });
    </script>
</body></html>
