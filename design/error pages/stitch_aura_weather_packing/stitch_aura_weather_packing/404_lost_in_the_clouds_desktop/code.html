<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .paper-texture {
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");

        }

        .atmosphere-gradient {
            background: linear-gradient(180deg, #F9F9FF 0%, #E2EFFF 100%);
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .floating-element {
            animation: float 6s ease-in-out infinite;
        }

        .grain {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            opacity: 0.03;
            z-index: 100;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");

</div>

<!-- Interactive Micro-interaction: Parallax Clouds -->
<script>
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            
            const floating = document.querySelector('.floating-element');
            if (floating) {
                floating.style.transform = `translate(${moveX}px, ${moveY}px)`;
            }
        });

        // Suppression of TopNavBar and BottomNavBar as per "Destination Rule"
        // This is a focused transactional-style 404 screen, so global nav is hidden to prioritize the "Return" journey.
    </script>
