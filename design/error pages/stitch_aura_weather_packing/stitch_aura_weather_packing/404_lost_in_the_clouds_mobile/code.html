<style>.noise-texture {
    position: relative
    }
.noise-texture::after {
    content: "";
    position: absolute;
    inset: 0;
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuA5IV3zLSjxG0l_RfIZtDQZ5Zww-L_TNNW9ngbNxCFVIY_-wfBBoM9reRK2y8fP_bnSS183KG4iXyVKJANFP9UoStVRjeR0e3aOpp6xUjUB6_Otn5cJAfrKHO-TxZDkLds1Rug28WJyKpuf3bKR0zGMI0rXC68iNIPKS0vPUdkYtGEaa3sxHhXSKOjPMbA-TfqUofbkTbdirghqXAIa4VVtg6KEXoDbFlxMgAB-iRjm5XofeirSamHQ);
    opacity: 0.03;
    pointer-events: none;
    z-index: 1
    }
.parallax-cloud-1 {
    animation: float 12s ease-in-out infinite
    }
.parallax-cloud-2 {
    animation: float 18s ease-in-out infinite reverse
    }
@keyframes float {
    0%, 100% {
        transform: translateY(0) translateX(0);
        } 50% {
        transform: translateY(-20px) translateX(10px);
        }
    }
.fade-in-up {
    animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards
    }
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
        } to {
        opacity: 1;
        transform: translateY(0);
        }
    }
.spring-active:active {
    transform: scale(0.95);
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1)
    }</style>
</head>

<!-- Atmospheric Floating Element -->

</div>

<!-- Interactive script for subtle mouse-parallax on the main illustration -->
<script>
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            const illustration = document.querySelector('.fade-in-up img');
            if(illustration) {
                illustration.style.transform = `translateX(${x}px) translateY(${y}px) scale(1.05)`;
            }
        });
    </script>
