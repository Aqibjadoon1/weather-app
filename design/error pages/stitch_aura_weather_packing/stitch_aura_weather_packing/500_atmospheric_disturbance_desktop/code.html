<style>
        .noise-texture {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.03;
            z-index: 60;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        
        .bouncy-hover {
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .bouncy-hover:active {
            transform: scale(0.92);
        }

        .ambient-glow {
            box-shadow: 0 40px 100px -10px rgba(76, 74, 202, 0.12);
        }

        .text-glow {
            text-shadow: 0 0 20px rgba(0, 88, 188, 0.3);
        }

        @keyframes drift {
            from { transform: translateY(0px) rotate(0deg); }
            to { transform: translateY(-20px) rotate(2deg); }
        }

        .floating-element {
            animation: drift 6s ease-in-out infinite alternate;
        }
    </style>

<body class="bg-background text-on-background min-h-screen overflow-x-hidden font-body-md">
<div class="noise-texture"></div>
<!-- Background Shader Layer -->
<div class="fixed inset-0 z-0">

</div>

<main class="relative z-10 flex flex-col items-center justify-center min-h-screen px-container-padding py-section-margin max-w-7xl mx-auto">
<div class="grid grid-cols-1 md:grid-cols-12 gap-unit items-center w-full">

<div class="absolute -bottom-8 right-asymmetric-offset text-label-bold font-label-bold text-outline uppercase tracking-[0.2em] hidden md:block">
                        Status: 500_Critical
                    </div>
</div>
</div>
<!-- Content Column -->
<div class="md:col-span-5 md:col-start-8 flex flex-col items-start text-left space-y-element-gap">

<span class="w-8 h-[2px] bg-primary"></span>
<span class="font-label-bold text-label-bold text-primary uppercase tracking-widest">System Anomaly</span>
</div>
<!-- Headline -->
<h1 class="font-headline-lg text-headline-lg text-on-surface leading-tight tracking-tight text-glow">
                    Atmospheric <br/>Disturbance
                </h1>
<!-- Body Text (Editorial White Space) -->
<div class="max-w-md mt-4">
<p class="font-body-lg text-body-lg text-on-surface-variant leading-relaxed">
                        Our sensors are experiencing a rare electrical storm in the data core. We're recalibrating our instruments to restore synchronization.
                    </p>
</div>
<!-- Progress / Status Indicator (Tactile Detail) -->
<div class="w-full max-w-sm mt-8 space-y-2">
<div class="flex justify-between font-label-bold text-label-bold text-outline">
<span>Recalibrating Flux Nodes</span>

</div>

<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">refresh</span>

<div class="fixed top-0 left-0 w-[600px] h-[600px] bg-primary/5 rounded-full blur-[100px] pointer-events-none -translate-x-1/2 -translate-y-1/2 transition-opacity duration-1000 opacity-0 z-0" id="cursor-glow"></div>
<script>
        // Micro-interaction for cursor light
        const cursorGlow = document.getElementById('cursor-glow');
        
        document.addEventListener('mousemove', (e) => {
            cursorGlow.style.opacity = '1';
            cursorGlow.style.left = e.clientX + 'px';
            cursorGlow.style.top = e.clientY + 'px';
        });

        // Simulating the "bouncy" spring feel for buttons with JS if needed, 
        // though CSS cubic-bezier is already handling most of it.
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mouseenter', () => {
                // Subtle scale or effect
            });
        });

        }
