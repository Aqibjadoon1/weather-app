<!DOCTYPE html>

<html class="dark" lang="en"><head>

<style>
        :root {
            --glass-border: rgba(255, 255, 255, 0.1);
            --rim-light: rgba(255, 255, 255, 0.05);
        }
        body {
            background-color: #141313;
            color: #e5e2e1;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        .glass-panel {
            background: rgba(32, 31, 31, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
        }
        .rim-glow {
            box-shadow: inset 0 0 0 1px var(--rim-light);
        }
        .atmospheric-bg {
            background: radial-gradient(circle at top right, #1a1c1c 0%, #141313 100%);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
    </style>

<body class="atmospheric-bg min-h-screen flex flex-col items-center justify-center">
<!-- Top Navigation Anchor -->
<header class="bg-surface/80 backdrop-blur-xl dark:bg-surface/80 border-b border-white/10 dark:border-white/5 docked full-width top-0 sticky z-50 w-full">
<div class="flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop py-4 max-w-container-max mx-auto">
<span class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary dark:text-primary tracking-tight">Aura Weather</span>
<div class="flex gap-4 items-center">
<button class="text-on-surface-variant hover:text-primary transition-colors duration-300">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-1 w-full max-w-md px-margin-mobile flex flex-col items-center justify-center text-center pb-24">
<!-- Illustration Container -->
<div class="relative w-full aspect-square mb-12 flex items-center justify-center">
<!-- Animated Shader for Subtle Atmosphere -->

<!-- Hero Illustration: The Still Bell -->
<div class="relative z-10 w-64 h-64 flex items-center justify-center animate-float">
<div class="relative overflow-hidden rounded-full w-full h-full glass-panel rim-glow flex items-center justify-center">
<img class="w-full h-full object-cover" data-alt="A cinematic, high-contrast digital illustration of a single, antique silver bell suspended by a thin silk cord. The scene is set against a deep indigo and black night sky, illuminated by a brilliant, cool-toned crescent moon that casts long, soft shadows. The bell is perfectly still, reflecting the soft moonlight with a mirror-like finish, embodying a sense of profound silence and nocturnal peace. The overall aesthetic is luxury editorial, with a focus on sharp textures and dark, atmospheric lighting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCNhvTKrcw6p5StpdnnDPTudnspjWIbGSv7S6ygBpRD5tdUfQDgPXMOue9vQ7VhDuf9R3wscWZw81wzOu8tlVBmrnH8a788F5uvJmDb0QHo9GhCelz9NKlLos8vrjG5W65Bw4DicUB8ny6CJDYpepqhaLyNxpoW3nyHu_NIjfwurKgofsNhT_1JWPuc0-KRnboUKxvmlD3-RU8V7pA20PFERTnbVuxUu3aM0xqQxl-Pp63OZZr2CPSa"/>
<!-- Data Overlay Chip -->
<div class="absolute bottom-8 px-3 py-1 bg-white/10 backdrop-blur-md rounded-full border border-white/20">
<span class="font-label-caps text-label-caps text-primary">0 ACTIVE ALERTS</span>
</div>
</div>
</div>
</div>
<!-- Typography Cluster -->
<div class="space-y-4">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary">Absolute Calm.</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px] mx-auto opacity-80">
                The atmosphere is quiet right now. No alerts or reminders to report.
            </p>
</div>
<!-- CTA Action -->
<div class="mt-12 w-full px-8">
<button class="w-full py-4 bg-primary text-on-primary font-label-caps text-label-caps tracking-widest rounded-lg hover:scale-[0.98] transition-transform duration-200">
                Check Forecast
            </button>
</div>
</main>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 pb-safe bg-surface-container/60 backdrop-blur-2xl dark:bg-surface-container/60 border-t border-white/10 dark:border-white/5 shadow-2xl rounded-t-xl">
<a class="flex flex-col items-center justify-center text-on-surface-variant/60 p-2 hover:text-primary transition-opacity duration-200" href="#">
<span class="material-symbols-outlined" data-icon="cloud_queue">cloud_queue</span>
<span class="font-label-caps text-label-caps mt-1">Atmosphere</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant/60 p-2 hover:text-primary transition-opacity duration-200" href="#">
<span class="material-symbols-outlined" data-icon="explore">explore</span>
<span class="font-label-caps text-label-caps mt-1">Explore</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant/60 p-2 hover:text-primary transition-opacity duration-200" href="#">
<span class="material-symbols-outlined" data-icon="auto_stories">auto_stories</span>
<span class="font-label-caps text-label-caps mt-1">Journal</span>
</a>
<a class="flex flex-col items-center justify-center text-primary bg-white/10 rounded-full p-2" href="#">
<span class="material-symbols-outlined" data-icon="person" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-label-caps text-label-caps mt-1">Profile</span>
</a>
</nav>
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const buttons = document.querySelectorAll('button, a');
            buttons.forEach(btn => {
                btn.addEventListener('touchstart', () => {
                    btn.classList.add('scale-95');
                });
                btn.addEventListener('touchend', () => {
                    btn.classList.remove('scale-95');
                });
            });
        });
    </script>
</body></html>
