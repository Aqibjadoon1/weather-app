<style>
        body {
            background-color: #141313;
            color: #e5e2e1;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .grainy-gradient {
            background: radial-gradient(circle at 50% 50%, #353434 0%, #141313 100%);
            position: relative;
        }
        .grainy-gradient::before {
            content: "";
            position: absolute;
            inset: 0;
            opacity: 0.05;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            pointer-events: none;
        }

        .lightning-container {
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.1));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .glow-button {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .glow-button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            transform: scale(0);
            transition: transform 0.6s ease-out;
        }
        .glow-button:active::after {
            transform: scale(1);
        }

        .blur-backdrop {
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">
<!-- Top Navigation -->
<nav class="bg-surface/80 backdrop-blur-xl dark:bg-surface/80 border-b border-white/10 dark:border-white/5 docked full-width top-0 sticky z-50 transition-all duration-300 ease-in-out">
<div class="flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop py-4 max-w-container-max mx-auto">
<span class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary dark:text-primary tracking-tight">Aura Weather</span>
<div class="flex items-center gap-6">
<div class="hidden md:flex gap-8 items-center">
<a class="text-on-surface-variant font-body-md text-body-md hover:text-primary transition-colors duration-300" href="#">Forecasts</a>
<a class="text-on-surface-variant font-body-md text-body-md hover:text-primary transition-colors duration-300" href="#">Radar</a>
<a class="text-on-surface-variant font-body-md text-body-md hover:text-primary transition-colors duration-300" href="#">Packing</a>
</div>
<button class="text-primary hover:rotate-90 transition-transform duration-500">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">settings</span>
</button>
</div>
</div>
</nav>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center grainy-gradient relative overflow-hidden px-margin-mobile">
<!-- Background Atmospheric Element -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[150%] h-[150%] pointer-events-none opacity-20">

</div>
<div class="relative z-10 w-full max-w-md text-center flex flex-col items-center">
<!-- Stylized Illustration -->
<div class="lightning-container mb-12">
<div class="relative w-64 h-64 flex items-center justify-center">
<!-- Cloud -->
<div class="absolute top-8 w-48 h-24 bg-surface-container-high/40 rounded-full blur-xl border border-white/5"></div>
<div class="absolute top-4 w-32 h-32 bg-surface-container-highest/60 rounded-full blur-2xl"></div>
<!-- Broken Lightning Bolt Icon -->
<div class="relative flex flex-col items-center">
<span class="material-symbols-outlined text-primary text-[120px] opacity-20 blur-[2px] absolute" style="font-variation-settings: 'FILL' 1;">bolt</span>
<div class="relative flex flex-col items-center gap-4">
<!-- Upper Bolt Piece -->
<div class="transform -translate-y-2 -translate-x-1 rotate-[-5deg]">
<span class="material-symbols-outlined text-primary text-[80px]" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
<!-- Disconnection Gap -->
<div class="w-12 h-0.5 bg-error/40 blur-[1px] rotate-12"></div>
<!-- Lower Bolt Piece -->
<div class="transform translate-y-2 translate-x-2 rotate-[15deg] opacity-50">
<span class="material-symbols-outlined text-outline text-[60px]" style="font-variation-settings: 'FILL' 0;">bolt</span>
</div>
</div>
</div>
<!-- Fog Effects -->
<div class="absolute bottom-0 w-full h-24 bg-gradient-to-t from-background to-transparent opacity-80"></div>
</div>
</div>
<!-- Message Cluster -->
<div class="space-y-6">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">Signal Lost in the Fog</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-xs mx-auto leading-relaxed">
                    You're currently untethered from the atmosphere. Reconnect to see the latest shifts.
                </p>
<!-- CTA -->
<div class="pt-8">
<button class="glow-button group relative px-12 py-4 bg-primary text-on-primary font-label-caps text-label-caps rounded-full flex items-center gap-3 mx-auto hover:bg-white/90 transition-all duration-300 hover:scale-105 active:scale-95 shadow-2xl" onclick="window.location.reload()">
                        Retry Connection
                        <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">sync</span>
</button>
<button class="mt-6 font-label-caps text-label-caps text-outline hover:text-primary transition-colors px-6 py-2 uppercase tracking-widest">
                        Check Saved Data
                    </button>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation Bar (Mobile Focused) -->
<footer class="md:hidden">
<div class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 pb-safe bg-surface-container/60 backdrop-blur-2xl dark:bg-surface-container/60 border-t border-white/10 dark:border-white/5 shadow-2xl rounded-t-xl">
<!-- Active State determined: Atmosphere is closest to "Offline/Weather" intent but inactive since we are offline -->
<a class="flex flex-col items-center justify-center text-on-surface-variant/60 p-2 hover:text-primary transition-opacity duration-200 Active: scale-95 duration-150" href="#">
<span class="material-symbols-outlined" data-icon="cloud_queue">cloud_queue</span>
<span class="font-label-caps text-label-caps mt-1 uppercase">Atmosphere</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant/60 p-2 hover:text-primary transition-opacity duration-200 Active: scale-95 duration-150" href="#">
<span class="material-symbols-outlined" data-icon="explore">explore</span>
<span class="font-label-caps text-label-caps mt-1 uppercase">Explore</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant/60 p-2 hover:text-primary transition-opacity duration-200 Active: scale-95 duration-150" href="#">
<span class="material-symbols-outlined" data-icon="auto_stories">auto_stories</span>
<span class="font-label-caps text-label-caps mt-1 uppercase">Journal</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant/60 p-2 hover:text-primary transition-opacity duration-200 Active: scale-95 duration-150" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label-caps text-label-caps mt-1 uppercase">Profile</span>
</a>
</div>
</footer>
<script>
        // Micro-interaction: Mouse parallax on the lightning illustration
        document.addEventListener('mousemove', (e) => {
            const container = document.querySelector('.lightning-container');
            if (!container) return;
            
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            
            container.style.transform = `translate(${x}px, ${y}px)`;
        });

        // Simulating a "reconnecting" state on button click
        document.querySelector('.glow-button').addEventListener('click', function(e) {
            const btn = this;
            const icon = btn.querySelector('.material-symbols-outlined');
            icon.classList.add('animate-spin');
            btn.innerHTML = 'Connecting...';
            btn.classList.add('opacity-80');
            
            setTimeout(() => {
                icon.classList.remove('animate-spin');
                btn.innerHTML = 'Still Offline';
                btn.classList.add('bg-error', 'text-on-error');
                setTimeout(() => {
                    btn.innerHTML = 'Retry Connection <span class="material-symbols-outlined text-[18px]">sync</span>';
                    btn.classList.remove('bg-error', 'text-on-error', 'opacity-80');
                }, 2000);
            }, 1500);
        });
    </script>
</body></html>
