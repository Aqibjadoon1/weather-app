<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_35 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_35" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_35');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
container.appendChild(renderer.domElement);

const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);
const sunLight = new THREE.PointLight(0xffcc33, 2, 50);
sunLight.position.set(5, 5, 2);
scene.add(sunLight);

// Create 4 atmospheric states (Morning, Afternoon, Evening, Night)
// Distributed across the horizontal plane for a "scrollable journey"
const states = [
    { name: 'Morning', color: 0xffccaa, x: -15 },
    { name: 'Afternoon', color: 0xffdd44, x: -5 },
    { name: 'Evening', color: 0xff5522, x: 5 },
    { name: 'Night', color: 0x88aaff, x: 15 }
];

const suns = [];
states.forEach((s, i) => {
    const sunGroup = new THREE.Group();
    const sunGeo = new THREE.SphereGeometry(1.2, 64, 64);
    const sunMat = new THREE.MeshPhongMaterial({ 
        color: s.color, 
        emissive: s.color,
        emissiveIntensity: 0.5,
        shininess: 100 
    });
    const sun = new THREE.Mesh(sunGeo, sunMat);
    sunGroup.add(sun);
    
    // Rays
    for(let j=0; j<12; j++) {
        const rayGeo = new THREE.CylinderGeometry(0.01, 0.1, 2, 8);
        const rayMat = new THREE.MeshPhongMaterial({ color: s.color, transparent: true, opacity: 0.3 });
        const ray = new THREE.Mesh(rayGeo, rayMat);
        const angle = (j / 12) * Math.PI * 2;
        ray.position.set(Math.cos(angle) * 2.2, Math.sin(angle) * 2.2, 0);
        ray.rotation.z = angle + Math.PI/2;
        sunGroup.add(ray);
    }
    
    sunGroup.position.set(s.x, 3, -8);
    if (s.name === 'Night') {
        sun.material.color.setHex(0xcccccc);
        sun.material.emissive.setHex(0xaaaaaa);
    }
    scene.add(sunGroup);
    suns.push(sunGroup);
});

// Particles
const particlesCount = 500;
const positions = new Float32Array(particlesCount * 3);
for(let i = 0; i < particlesCount; i++) {
    positions[i*3] = (Math.random() - 0.5) * 60;
    positions[i*3+1] = (Math.random() - 0.5) * 20;
    positions[i*3+2] = (Math.random() - 0.5) * 10;
}
const partGeo = new THREE.BufferGeometry();
partGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const partMat = new THREE.PointsMaterial({ size: 0.05, color: 0xffffff, transparent: true, opacity: 0.4 });
const particles = new THREE.Points(partGeo, partMat);
scene.add(particles);

camera.position.z = 12;

function animate() {
    requestAnimationFrame(animate);
    const time = Date.now() * 0.001;
    
    suns.forEach((sun, i) => {
        sun.rotation.z += 0.002;
        sun.scale.setScalar(1 + Math.sin(time + i) * 0.03);
    });
    
    const p = particles.geometry.attributes.position.array;
    for(let i=0; i<particlesCount; i++) {
        p[i*3] += 0.02;
        if(p[i*3] > 30) p[i*3] = -30;
    }
    particles.geometry.attributes.position.needsUpdate = true;
    
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
});

animate();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_35 -->
</body>
</html>
