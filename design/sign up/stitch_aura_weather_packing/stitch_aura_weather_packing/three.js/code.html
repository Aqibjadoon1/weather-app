<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_20 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_20" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_20');
  const devicePixelRatio = window.devicePixelRatio || 1;
  (function() {
  const width = container.clientWidth || window.innerWidth;
  const height = container.clientHeight || window.innerHeight;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setSize(width, height);
  container.appendChild(renderer.domElement);

  const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
  scene.add(ambientLight);
  const pointLight = new THREE.PointLight(0xffcc33, 2.5, 50);
  pointLight.position.set(5, 5, 2);
  scene.add(pointLight);

  const sunGroup = new THREE.Group();
  const sunGeo = new THREE.SphereGeometry(1, 64, 64);
  const sunMat = new THREE.MeshPhongMaterial({ color: 0xffdd44, emissive: 0xffaa00, emissiveIntensity: 0.8, shininess: 100 });
  const sun = new THREE.Mesh(sunGeo, sunMat);
  sunGroup.add(sun);

  const raysGroup = new THREE.Group();
  for(let i=0; i<16; i++) {
      const rayGeo = new THREE.CylinderGeometry(0.01, 0.06, 1.5, 8);
      const rayMat = new THREE.MeshPhongMaterial({ color: 0xffcc33, transparent: true, opacity: 0.4 });
      const ray = new THREE.Mesh(rayGeo, rayMat);
      const angle = (i / 16) * Math.PI * 2;
      ray.position.set(Math.cos(angle) * 1.8, Math.sin(angle) * 1.8, 0);
      ray.rotation.z = angle + Math.PI/2;
      raysGroup.add(ray);
  }
  sunGroup.add(raysGroup);
  sunGroup.position.set(3, 4, -5);
  scene.add(sunGroup);

  const particlesCount = 400;
  const positions = new Float32Array(particlesCount * 3);
  const velocities = [];
  for(let i = 0; i < particlesCount; i++) {
      positions[i*3] = (Math.random() - 0.5) * 25;
      positions[i*3+1] = (Math.random() - 0.5) * 20;
      positions[i*3+2] = (Math.random() - 0.5) * 10;
      velocities.push({ x: 0.01 + Math.random() * 0.03, y: (Math.random() - 0.5) * 0.01, phase: Math.random() * Math.PI * 2 });
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({ size: 0.05, color: 0xffffff, transparent: true, opacity: 0.5 });
  const wind = new THREE.Points(geo, mat);
  scene.add(wind);

  const birds = [];
  function createBird() {
      const b = new THREE.Group();
      const w = new THREE.PlaneGeometry(0.2, 0.06);
      const m = new THREE.MeshBasicMaterial({ color: 0x111111, side: THREE.DoubleSide });
      const lw = new THREE.Mesh(w, m); const rw = lw.clone();
      lw.position.x = -0.1; rw.position.x = 0.1;
      b.add(lw, rw);
      b.position.set(-15 - Math.random() * 10, 1 + Math.random() * 5, -6);
      scene.add(b);
      return { mesh: b, lw, rw, speed: 0.02 + Math.random() * 0.04, phase: Math.random() * Math.PI };
  }
  for(let i=0; i<6; i++) birds.push(createBird());

  camera.position.z = 10;

  function animate() {
      requestAnimationFrame(animate);
      const time = Date.now() * 0.001;
      sunGroup.rotation.z += 0.002;
      raysGroup.rotation.z -= 0.004;
      sun.scale.setScalar(1 + Math.sin(time * 1.5) * 0.03);
      const p = wind.geometry.attributes.position.array;
      for(let i=0; i<particlesCount; i++) {
          p[i*3] += velocities[i].x;
          p[i*3+1] += Math.sin(time + velocities[i].phase) * 0.005;
          if(p[i*3] > 12) p[i*3] = -12;
      }
      wind.geometry.attributes.position.needsUpdate = true;
      birds.forEach(b => {
          b.mesh.position.x += b.speed;
          const flap = Math.sin(time * 8 + b.phase) * 0.5;
          b.lw.rotation.z = flap; b.rw.rotation.z = -flap;
          if(b.mesh.position.x > 15) b.mesh.position.x = -15;
      });
      renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
      const w = container.clientWidth || window.innerWidth;
      const h = container.clientHeight || window.innerHeight;
      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
  });
  animate();
})();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_20 -->
</body>
</html>
