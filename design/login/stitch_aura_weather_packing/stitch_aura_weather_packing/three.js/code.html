<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_15 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_15" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_15');
  const devicePixelRatio = window.devicePixelRatio || 1;
  (function() {
  const width = container.clientWidth || window.innerWidth;
  const height = container.clientHeight || window.innerHeight;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setSize(width, height);
  container.appendChild(renderer.domElement);

  // Lights
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambientLight);
  const pointLight = new THREE.PointLight(0xffcc33, 2, 50);
  pointLight.position.set(5, 5, 2);
  scene.add(pointLight);

  // Sun Core
  const sunGroup = new THREE.Group();
  const sunGeo = new THREE.SphereGeometry(1, 64, 64);
  const sunMat = new THREE.MeshPhongMaterial({ 
      color: 0xffdd44, 
      emissive: 0xffaa00,
      emissiveIntensity: 0.8,
      shininess: 100 
  });
  const sun = new THREE.Mesh(sunGeo, sunMat);
  sunGroup.add(sun);

  // Rays
  const raysGroup = new THREE.Group();
  for(let i=0; i<16; i++) {
      const rayGeo = new THREE.CylinderGeometry(0.01, 0.06, 1.4, 8);
      const rayMat = new THREE.MeshPhongMaterial({ 
          color: 0xffcc33,
          transparent: true,
          opacity: 0.5
      });
      const ray = new THREE.Mesh(rayGeo, rayMat);
      const angle = (i / 16) * Math.PI * 2;
      ray.position.set(Math.cos(angle) * 1.8, Math.sin(angle) * 1.8, 0);
      ray.rotation.z = angle + Math.PI/2;
      raysGroup.add(ray);
  }
  sunGroup.add(raysGroup);
  
  // Position sun in the top right of the illustration area
  sunGroup.position.set(3, 3, -5);
  scene.add(sunGroup);

  // Floating Weather Particles (Snow/Pollen/Dust)
  const particlesCount = 300;
  const positions = new Float32Array(particlesCount * 3);
  const velocities = [];

  for(let i = 0; i < particlesCount; i++) {
      positions[i*3] = (Math.random() - 0.5) * 20;
      positions[i*3+1] = (Math.random() - 0.5) * 20;
      positions[i*3+2] = (Math.random() - 0.5) * 10;
      velocities.push({
          x: (Math.random() - 0.5) * 0.02,
          y: -0.01 - Math.random() * 0.02,
          z: (Math.random() - 0.5) * 0.01,
          phase: Math.random() * Math.PI * 2
      });
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({ size: 0.06, color: 0xffffff, transparent: true, opacity: 0.4 });
  const particles = new THREE.Points(geo, mat);
  scene.add(particles);

  // Birds
  const birds = [];
  function createBird() {
      const bird = new THREE.Group();
      const wingGeo = new THREE.PlaneGeometry(0.25, 0.08);
      const wingMat = new THREE.MeshBasicMaterial({ color: 0x1a1a1a, side: THREE.DoubleSide });
      const lw = new THREE.Mesh(wingGeo, wingMat);
      const rw = lw.clone();
      lw.position.x = -0.12;
      rw.position.x = 0.12;
      bird.add(lw, rw);
      bird.position.set(-10 - Math.random() * 10, 2 + Math.random() * 4, -4);
      scene.add(bird);
      return { mesh: bird, lw, rw, speed: 0.02 + Math.random() * 0.03, phase: Math.random() * Math.PI };
  }
  for(let i=0; i<4; i++) birds.push(createBird());

  camera.position.z = 10;

  function animate() {
      requestAnimationFrame(animate);
      const time = Date.now() * 0.001;

      sunGroup.rotation.z += 0.003;
      raysGroup.rotation.z -= 0.005;
      sun.scale.setScalar(1 + Math.sin(time * 2) * 0.04);

      const pos = particles.geometry.attributes.position.array;
      for(let i=0; i<particlesCount; i++) {
          pos[i*3] += velocities[i].x;
          pos[i*3+1] += velocities[i].y + Math.sin(time + velocities[i].phase) * 0.005;
          if(pos[i*3+1] < -10) pos[i*3+1] = 10;
          if(pos[i*3] > 10) pos[i*3] = -10;
          if(pos[i*3] < -10) pos[i*3] = 10;
      }
      particles.geometry.attributes.position.needsUpdate = true;

      birds.forEach(b => {
          b.mesh.position.x += b.speed;
          b.mesh.position.y += Math.sin(time + b.phase) * 0.006;
          const flap = Math.sin(time * 8 + b.phase) * 0.5;
          b.lw.rotation.z = flap;
          b.rw.rotation.z = -flap;
          if(b.mesh.position.x > 15) b.mesh.position.x = -15;
      });

      renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
      const w = container.clientWidth || window.innerWidth;
      const h = container.clientHeight || window.innerHeight;
      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
  });

  animate();
})();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_15 -->
</body>
</html>
